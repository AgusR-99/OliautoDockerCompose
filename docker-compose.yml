version: '3.4'

services:
  apigateway:
    image: agusr99/apigateway
    ports:
      - "30000:3000"
    environment: 
      JWTKEY: ${JWTKEY}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_HTTP_PORTS: 3000
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile

  auth:
    container_name: Auth
    image: agusr99/auth
    ports:
      - "30001:3001"
    environment: 
      JWTKEY: ${JWTKEY}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_HTTP_PORTS: 3001
      APIGATEWAYBASEADDRESS: ${APIGATEWAYBASEADDRESS}
      Usuario: ${USUARIO}
      Password: ${PASSWORD}
      Servidor: ${SERVIDOR}
      BD: ${BD}
    build:
      context: .
      dockerfile: Auth/Dockerfile

  sessionapi:
    image: agusr99/sessionapi
    ports:
      - "30002:3002"
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ASPNETCORE_HTTP_PORTS: 3002
        Usuario: ${USUARIO}
        Password: ${PASSWORD}
        Servidor: ${SERVIDOR}
        BD: ${BD}
    build:
      context: .
      dockerfile: SessionAPI/Dockerfile


  archivosapi:
    image: agusr99/archivosapi
    ports:
      - "30003:3003"
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ASPNETCORE_HTTP_PORTS: 3003
        Usuario: ${USUARIO}
        Password: ${PASSWORD}
        Servidor: ${SERVIDOR}
        BD: ${BD}
        FTPUSER: ${FTPUSER}
        FTPPASSWORD: ${FTPPASSWORD}
        FTPURL: ${FTPURL}
    build:
      context: .
      dockerfile: ArchivosAPI/Dockerfile


  clientesapi:
    image: agusr99/clientesapi
    ports:
      - "30004:3004"
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ASPNETCORE_HTTP_PORTS: 3004
        Usuario: ${USUARIO}
        Password: ${PASSWORD}
        Servidor: ${SERVIDOR}
        BD: ${BD}
    build:
      context: .
      dockerfile: ClientesAPI/Dockerfile


  generalesapi:
    image: agusr99/generalesapi
    ports:
      - "30005:3005"
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ASPNETCORE_HTTP_PORTS: 3005
        Usuario: ${USUARIO}
        Password: ${PASSWORD}
        Servidor: ${SERVIDOR}
        BD: ${BD}
    build:
      context: .
      dockerfile: GeneralesAPI/Dockerfile


  logisticaapi:
    image: agusr99/logisticaapi
    ports:
      - "30006:3006"
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ASPNETCORE_HTTP_PORTS: 3006
        Usuario: ${USUARIO}
        Password: ${PASSWORD}
        Servidor: ${SERVIDOR}
        BD: ${BD}
    build:
      context: .
      dockerfile: LogisticaAPI/Dockerfile


  repuestoapi:
    image: agusr99/repuestoapi
    ports:
      - "30007:3007"
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ASPNETCORE_HTTP_PORTS: 3007
        Usuario: ${USUARIO}
        Password: ${PASSWORD}
        Servidor: ${SERVIDOR}
        BD: ${BD}
    build:
      context: .
      dockerfile: RepuestoAPI/Dockerfile


  tallerapi:
    image: agusr99/tallerapi
    ports:
      - "30008:3008"
    environment:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
        ASPNETCORE_HTTP_PORTS: 3008
        Usuario: ${USUARIO}
        Password: ${PASSWORD}
        Servidor: ${SERVIDOR}
        BD: ${BD}
    build:
      context: .
      dockerfile: TallerAPI/Dockerfile
